<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predio Virtual - Autos en Venta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans">

    <header class="bg-blue-700 text-white p-6 shadow-md text-center">
        <h1 class="text-3xl font-bold">🚗 MI PREDIO VIRTUAL</h1>
        <p class="text-sm mt-1">Inventario actualizado en tiempo real</p>
    </header>

    <div class="max-w-6xl mx-auto mt-6 p-4 bg-white rounded-lg shadow flex flex-col md:flex-row gap-4">
        <input type="text" id="search" placeholder="Buscar por marca, modelo o código..." class="border p-2 rounded w-full md:w-1/2 focus:outline-blue-500">
        <select id="filter-marca" class="border p-2 rounded w-full md:w-1/4">
            <option value="">Todas las marcas</option>
        </select>
        <select id="filter-anio" class="border p-2 rounded w-full md:w-1/4">
            <option value="">Todos los años</option>
        </select>
    </div>

    <main id="catalogo" class="max-w-6xl mx-auto mt-6 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 p-4">
        </main>

    <div id="modal" class="fixed inset-0 bg-black bg-opacity-75 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-lg max-w-4xl w-full max-h-[90vh] overflow-y-auto relative p-6">
            <button onclick="cerrarModal()" class="absolute top-4 right-4 text-gray-600 hover:text-black text-2xl font-bold">&times;</button>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <div class="relative h-64 md:h-80 bg-black rounded-lg overflow-hidden flex items-center justify-center">
                        <img id="galeria-img" src="" class="max-h-full max-w-full object-contain">
                        <button onclick="cambiarFoto(-1)" class="absolute left-2 top-1/2 -translate-y-1/2 bg-black bg-opacity-50 text-white p-2 rounded-full hover:bg-opacity-70"><i class="fas fa-chevron-left"></i></button>
                        <button onclick="cambiarFoto(1)" class="absolute right-2 top-1/2 -translate-y-1/2 bg-black bg-opacity-50 text-white p-2 rounded-full hover:bg-opacity-70"><i class="fas fa-chevron-right"></i></button>
                    </div>
                    <p id="galeria-contador" class="text-center text-sm text-gray-500 mt-2">Foto 1 de 1</p>
                </div>

                <div class="flex flex-col justify-between">
                    <div>
                        <h2 id="modal-titulo" class="text-2xl font-bold text-gray-800"></h2>
                        <p id="modal-precio" class="text-xl font-bold text-green-600 mt-1"></p>
                        <hr class="my-4">
                        <div class="grid grid-cols-2 gap-2 text-sm text-gray-600" id="modal-detalles">
                            </div>
                        <p id="modal-descripcion" class="mt-4 text-gray-700 text-sm bg-gray-50 p-3 rounded"></p>
                    </div>
                    <a id="btn-whatsapp" href="#" target="_blank" class="mt-6 block text-center bg-green-500 text-white font-bold py-3 rounded-lg shadow hover:bg-green-600 transition">
                        <i class="fab fa-whatsapp mr-2"></i> ME INTERESA / SOLICITAR INFO
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        let inventario = [];
        let fotosActuales = [];
        let fotoIndex = 0;
        const numeroWhatsApp = "50255555555"; // ⚠️ REEMPLAZA CON TU NÚMERO (Incluye código de país, ej: 502 para Guate)

        // Cargar Datos del archivo JSON
        async function cargarInventario() {
            try {
                const res = await fetch('inventario.json');
                inventario = await res.json();
                generarFiltros();
                renderizarCatálogo(inventario);
            } catch (error) {
                console.error("Error cargando el inventario:", error);
            }
        }

        function generarFiltros() {
            const marcas = [...new Set(inventario.map(c => c.marca))];
            const anios = [...new Set(inventario.map(c => c.anio))].sort((a,b)=>b-a);
            
            marcas.forEach(m => document.getElementById('filter-marca').innerHTML += `<option value="${m}">${m}</option>`);
            anios.forEach(a => document.getElementById('filter-anio').innerHTML += `<option value="${a}">${a}</option>`);
        }

        function renderizarCatálogo(lista) {
            const contenedor = document.getElementById('catalogo');
            contenedor.innerHTML = '';
            
            if(lista.length === 0) {
                contenedor.innerHTML = '<p class="text-gray-500 text-center col-span-full py-8">No se encontraron vehículos.</p>';
                return;
            }

            lista.forEach(carro => {
                contenedor.innerHTML += `
                    <div class="bg-white rounded-lg shadow hover:shadow-xl transition overflow-hidden cursor-pointer" onclick="verDetalle('${carro.id}')">
                        <img src="${carro.fotos[0]}" class="w-full h-48 object-cover">
                        <div class="p-4">
                            <span class="text-xs bg-blue-100 text-blue-800 px-2 py-1 rounded font-bold">ID: ${carro.id}</span>
                            <h3 class="text-lg font-bold text-gray-800 mt-2">${carro.marca} ${carro.modelo} ${carro.anio}</h3>
                            <p class="text-green-600 font-bold text-xl mt-1">${carro.precio}</p>
                            <div class="flex justify-between text-xs text-gray-500 mt-3 border-t pt-2">
                                <span><i class="fas fa-tachometer-alt"></i> ${carro.kilometraje}</span>
                                <span><i class="fas fa-cog"></i> ${carro.transmision}</span>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // Buscador en tiempo real
        document.getElementById('search').addEventListener('input', filtrar);
        document.getElementById('filter-marca').addEventListener('change', filtrar);
        document.getElementById('filter-anio').addEventListener('change', filtrar);

        function filtrar() {
            const busqueda = document.getElementById('search').value.toLowerCase();
            const marcaSel = document.getElementById('filter-marca').value;
            const anioSel = document.getElementById('filter-anio').value;

            const resultado = inventario.filter(c => {
                const coincideBusqueda = `${c.marca} ${c.modelo} ${c.id}`.toLowerCase().includes(busqueda);
                const coincideMarca = marcaSel === "" || c.marca === marcaSel;
                const coincideAnio = anioSel === "" || c.anio === anioSel;
                return coincideBusqueda && coincideMarca && coincideAnio;
            });
            renderizarCatálogo(resultado);
        }

        // Control de Ventana Modal y Galería
        function verDetalle(id) {
            const carro = inventario.find(c => c.id === id);
            if(!carro) return;

            fotosActuales = carro.fotos;
            fotoIndex = 0;
            actualizarImagenGaleria();

            document.getElementById('modal-titulo').innerText = `${carro.marca} ${carro.modelo} ${carro.anio}`;
            document.getElementById('modal-precio').innerText = carro.precio;
            document.getElementById('modal-descripcion').innerText = carro.descripcion;
            
            document.getElementById('modal-detalles').innerHTML = `
                <div><strong>Kilometraje:</strong> ${carro.kilometraje}</div>
                <div><strong>Transmisión:</strong> ${carro.transmision}</div>
                <div><strong>Combustible:</strong> ${carro.combustible}</div>
                <div><strong>Ubicación:</strong> ${carro.ubicacion}</div>
            `;

            // Configurar WhatsApp dinámico
            const mensaje = encodeURIComponent(`Hola, estoy interesado en el auto ${carro.marca} ${carro.modelo} ${carro.anio} (Código ID: ${carro.id}) visto en la web.`);
            document.getElementById('btn-whatsapp').href = `https://wa.me/${numeroWhatsApp}?text=${mensaje}`;

            document.getElementById('modal').classList.remove('hidden');
        }

        function cerrarModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        function actualizarImagenGaleria() {
            document.getElementById('galeria-img').src = fotosActuales[fotoIndex];
            document.getElementById('galeria-contador').innerText = `Foto ${fotoIndex + 1} de ${fotosActuales.length}`;
        }

        function cambiarFoto(direccion) {
            fotoIndex += direccion;
            if (fotoIndex >= fotosActuales.length) fotoIndex = 0;
            if (fotoIndex < 0) fotoIndex = fotosActuales.length - 1;
            actualizarImagenGaleria();
        }

        window.onload = cargarInventario;
    </script>
</body>
</html>
