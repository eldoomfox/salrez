<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SALREZ Auto Solutions - Inventario</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans">

    <header class="bg-black border-b-4 border-red-600 text-white p-4 shadow-md text-center">
        <img src="https://i.postimg.cc/yYG2pd42/logo.jpg" alt="SALREZ Auto Solutions" class="h-40 mx-auto object-contain" onerror="this.style.display='none'">
        <p class="text-sm mt-2 text-gray-300 tracking-wider">INVENTARIO ACTUALIZADO</p>
    </header>

    <main id="catalogo" class="max-w-5xl mx-auto mt-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 p-4">
    </main>

    <div id="modal" onclick="cerrarSiEsFondo(event)" class="fixed inset-0 bg-black bg-opacity-85 z-50 hidden overflow-y-auto cursor-pointer">
        <div class="flex justify-center min-h-screen pt-24 pb-10 px-2 sm:px-4">
            <div onclick="event.stopPropagation()" class="bg-white rounded-lg max-w-5xl w-full relative p-4 sm:p-6 shadow-2xl h-fit cursor-default">
                
                <button onclick="cerrarModal()" class="absolute top-2 right-4 text-gray-400 hover:text-red-600 text-4xl z-10">&times;</button>
                
                <div class="relative w-full h-64 sm:h-96 lg:h-[550px] bg-black rounded-lg overflow-hidden border">
                    <img id="galeria-img" src="" class="w-full h-full object-cover">
                    <button onclick="cambiarFoto(-1)" class="absolute left-2 top-1/2 bg-black/40 hover:bg-black/70 text-white p-3 rounded-full transition"><i class="fas fa-chevron-left"></i></button>
                    <button onclick="cambiarFoto(1)" class="absolute right-2 top-1/2 bg-black/40 hover:bg-black/70 text-white p-3 rounded-full transition"><i class="fas fa-chevron-right"></i></button>
                    <p id="galeria-contador" class="absolute bottom-4 right-4 bg-black/60 text-white text-xs px-3 py-1 rounded-full backdrop-blur-sm"></p>
                </div>

                <div class="mt-6 border-b pb-6">
                    <div class="flex justify-between items-start">
                        <h2 id="modal-titulo" class="text-2xl font-bold text-gray-800 uppercase"></h2>
                        <span id="modal-badge-estado" class="px-3 py-1 text-sm font-bold text-white rounded"></span>
                    </div>
                    
                    <p id="modal-precio" class="text-3xl font-black text-green-700 mt-2"></p>
                    
                    <a id="btn-whatsapp" href="#" target="_blank" class="mt-4 block w-full text-center bg-green-500 text-white font-bold py-3 rounded-lg hover:bg-green-600 transition">
                        <i class="fab fa-whatsapp mr-2"></i> SOLICITAR INFORMACIÓN
                    </a>
                </div>

                <div class="mt-4">
                    <h4 class="font-bold text-gray-500 uppercase text-sm mb-2">Detalles Técnicos:</h4>
                    <div class="grid grid-cols-2 gap-4 text-sm bg-gray-50 p-3 rounded" id="modal-detalles"></div>
                    
                    <h4 class="font-bold text-gray-500 uppercase text-sm mt-4 mb-2">Descripción:</h4>
                    <p id="modal-descripcion" class="text-sm text-gray-700 whitespace-pre-line border p-3 rounded"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let inventario = [], fotosActuales = [], fotoIndex = 0;
        const numeroWhatsApp = "50255555555"; 

        async function cargarInventario() {
            try {
                const res = await fetch('inventario.json');
                inventario = await res.json();
                const cat = document.getElementById('catalogo');
                cat.innerHTML = inventario.map(c => `
                    <div class="bg-white p-3 rounded shadow hover:shadow-lg cursor-pointer" onclick="verDetalle('${c.Modelo}')">
                        <img src="${c.Fotos[0] || 'https://via.placeholder.com/400'}" class="w-full h-40 object-cover rounded">
                        <h3 class="font-bold mt-2">${c.Marca} ${c.Modelo} (${c.Año})</h3>
                        <p class="text-green-700 font-bold">${c.Precio}</p>
                    </div>
                `).join('');
            } catch (e) { console.error("Error al cargar inventario:", e); }
        }

        function verDetalle(modelo) {
            const c = inventario.find(car => car.Modelo === modelo);
            if (!c) return;

            fotosActuales = c.Fotos || []; 
            fotoIndex = 0;
            actualizarGaleria();

            document.getElementById('modal-titulo').innerText = `${c.Marca} ${c.Modelo} ${c.Año}`;
            document.getElementById('modal-precio').innerText = c.Precio;
            document.getElementById('modal-descripcion').innerText = c.Descripcion || "Sin descripción disponible.";
            
            const badge = document.getElementById('modal-badge-estado');
            badge.innerText = c.Estado || "Sin estado";
            badge.className = `px-3 py-1 text-sm font-bold text-white rounded ${(c.Estado === 'Disponible') ? 'bg-green-500' : 'bg-red-600'}`;

            document.getElementById('modal-detalles').innerHTML = `
                <div><b>Millaje:</b> ${c.Millaje || 'N/A'}</div>
                <div><b>KM:</b> ${c.Kilometraje || 'N/A'}</div>
                <div><b>Transmisión:</b> ${c.Transmision || 'N/A'}</div>
                <div><b>Motor:</b> ${c.Motor || 'N/A'}</div>
            `;
            
            document.getElementById('btn-whatsapp').href = `https://wa.me/${numeroWhatsApp}?text=Interesado en ${c.Marca} ${c.Modelo} (${c.Año})`;
            document.getElementById('modal').classList.remove('hidden');
        }

        function cerrarModal() { document.getElementById('modal').classList.add('hidden'); }
        function cerrarSiEsFondo(event) { if (event.target.id === 'modal') cerrarModal(); }

        function actualizarGaleria() { 
            document.getElementById('galeria-img').src = fotosActuales[fotoIndex] || 'https://via.placeholder.com/800'; 
            document.getElementById('galeria-contador').innerText = `Foto ${fotoIndex + 1} / ${fotosActuales.length}`; 
        }

        function cambiarFoto(d) { 
            if (fotosActuales.length === 0) return;
            fotoIndex = (fotoIndex + d + fotosActuales.length) % fotosActuales.length; 
            actualizarGaleria(); 
        }

        window.onload = cargarInventario;
    </script>
</body>
</html>
